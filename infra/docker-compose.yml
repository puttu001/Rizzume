# Local dev orchestration. Run from repo root:
#   docker compose -f infra/docker-compose.yml --env-file .env.secrets up --build
#
# Each service still reads its own services/<name>/.env (least-privilege —
# see architecture discussion). The ${...} vars below are only for the
# shared infra containers (Postgres/MinIO) and are sourced from the root
# .env.secrets via --env-file.

name: rizzume

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # Every service below loads its own services/<name>/.env first (local-dev
  # defaults, e.g. `localhost`), then `environment:` overrides the handful of
  # network-dependent values to the container hostnames Docker's internal
  # DNS resolves — `environment:` wins over `env_file:` in Compose.

  api-gateway:
    build: ../services/api-gateway
    env_file: ../services/api-gateway/.env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      INTERVIEW_SERVICE_URL: http://interview-service:8000
      AUDIO_SERVICE_URL: http://audio-service:8000
      REPORT_SERVICE_URL: http://report-service:8000
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - interview-service
      - audio-service
      - report-service

  auth-service:
    build: ../services/auth-service
    env_file: ../services/auth-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/auth_db
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  interview-service:
    build: ../services/interview-service
    env_file: ../services/interview-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/interview_db
      CONVERSATION_SERVICE_URL: http://conversation-service:8000
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy

  conversation-service:
    build: ../services/conversation-service
    env_file: ../services/conversation-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/conversation_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  audio-service:
    build: ../services/audio-service
    env_file: ../services/audio-service/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
    ports:
      - "8004:8000"
    depends_on:
      redis:
        condition: service_healthy

  audio-worker:
    build: ../services/audio-service
    env_file: ../services/audio-service/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
    command: ["uv", "run", "celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy

  report-service:
    build: ../services/report-service
    env_file: ../services/report-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/report_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  report-worker:
    build: ../services/report-service
    env_file: ../services/report-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/report_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
    command: ["uv", "run", "celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ../frontend
    env_file: ../frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
  minio_data:
